name: Bug Report
description: Report a confirmed, reproducible bug
labels: ["bug"]
body:
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      description: |
        This template is for confirmed, reproducible bugs.
        If you're unsure, please open a [support discussion](https://github.com/RogueOneEcho/caesura/discussions/new?category=support) instead.
        For feature requests, open an [ideas discussion](https://github.com/RogueOneEcho/caesura/discussions/new?category=ideas).
      options:
        - label: I have searched for related discussions and issues
          required: true
        - label: I have confirmed this is a reproducible bug
          required: true
  - type: textarea
    id: version
    attributes:
      label: Version
      description: Output of `caesura version`
      render: text
  - type: textarea
    id: config
    attributes:
      label: Config
      description: |
        Any relevant configuration.
        Redact any secrets such as announce URL or API key.
        Sensitive details can be [encrypted with age or GPG](https://github.com/RogueOneEcho/RogueOneEcho/blob/main/README.md#age) so only the maintainer can decrypt.
      render: yaml
  - type: input
    id: command
    attributes:
      label: Command
      description: The command being run
  - type: textarea
    id: logs
    attributes:
      label: Trace logs
      description: |
        Relevant trace logs.
        Redact any secrets.
        Sensitive details can be [encrypted with age or GPG](https://github.com/RogueOneEcho/RogueOneEcho/blob/main/README.md#age) so only the maintainer can decrypt.
      render: text
  - type: dropdown
    id: indexer
    attributes:
      label: Indexer
      options:
        - RED
        - OPS
        - Other
  - type: input
    id: source_ids
    attributes:
      label: Source IDs
      description: ID numbers of any sources that trigger the issue
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Docker
        - Homebrew
        - Nix
        - Built from source
        - Other
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How to reproduce the bug, ideally as a failing test
  - type: textarea
    id: description
    attributes:
      label: Details
      description: What's happening and what did you expect?
