name: On Push
on:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:

  release:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - id: release
      env:
        GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: ${{ secrets.RELEASE_SCRIPT }}

    - run: echo "# ${{ steps.release.outputs.version}}" >> $GITHUB_STEP_SUMMARY

    - run: cat /tmp/release-notes.md >> $GITHUB_STEP_SUMMARY

    - uses: actions/upload-artifact@v4
      with:
        name: release-notes.md
        path: /tmp/release-notes.md

    - run: /home/linuxbrew/.linuxbrew/bin/brew install cargo-edit
      if: steps.release.outputs.version != ''

    - run: /home/linuxbrew/.linuxbrew/bin/cargo-set-version set-version -p caesura ${{ steps.release.outputs.version }}
      if: steps.release.outputs.version != ''

    - run: git --no-pager diff --color

    - uses: actions/upload-artifact@v4
      with:
        name: cargo-manifests
        path: |
          Cargo.toml
          Cargo.lock
          crates/core/Cargo.toml


  cargo-build:
    runs-on: ${{ matrix.os }}
    needs:
    - release
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
          test: true
        - os: ubuntu-24.04
          target: x86_64-unknown-linux-musl
        - os: macos-15-intel
          target: x86_64-apple-darwin
          test: true
        - os: macos-15
          target: aarch64-apple-darwin
          test: true
        - os: ubuntu-24.04-arm
          target: aarch64-unknown-linux-gnu
          test: true

    steps:

    - uses: actions/checkout@v4

    - name: Restore cargo cache
      id: cache-cargo
      uses: actions/cache/restore@v4
      with:
        key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_number }}
        restore-keys: |
          cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
          cargo-${{ matrix.target }}-
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/

    - uses: actions/download-artifact@v4
      with:
        name: cargo-manifests

    - run: git --no-pager diff --color

    - if: contains(matrix.os, 'ubuntu')
      run: echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

    - if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update

    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
      run: sudo apt-get install musl-tools --yes

    - run: rustup target add ${{ matrix.target }}

    - run: brew install cargo-auditable

    - run: cargo auditable build --release --target ${{ matrix.target }} --bins ${{ matrix.test && '--tests' || '' }}

    - name: Save cargo cache
      id: cargo-cache-save
      uses: actions/cache/save@v4
      with:
        key: ${{ steps.cache-cargo.outputs.cache-primary-key }}
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/

    - run: mkdir artifacts

    - name: Package binary as tar.xz
      run: |
        cp target/${{ matrix.target }}/release/caesura artifacts/caesura
        tar -cJf artifacts/caesura-${{ needs.release.outputs.version }}-${{ matrix.target }}.tar.xz \
          -C artifacts caesura

    - uses: actions/upload-artifact@v4
      with:
        name: caesura-${{ needs.release.outputs.version }}-${{ matrix.target }}
        path: artifacts/caesura-${{ needs.release.outputs.version }}-${{ matrix.target }}.tar.xz

    - run: rm -rf artifacts

    - name: Restore brew cache (Linux only)
      id: cache-brew
      if: matrix.test && contains(matrix.os, 'ubuntu')
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.os }}-brew-${{ runner.arch }}-v3-
        path: /home/linuxbrew/.linuxbrew

    - if: matrix.test && contains(matrix.os, 'ubuntu') && steps.cache-brew.outputs.cache-hit != 'true'
      run: brew install flac lame sox intermodal

    - if: matrix.test && contains(matrix.os, 'macos')
      run: brew install flac lame sox intermodal

    - name: Save brew cache (Linux only)
      if: matrix.test && contains(matrix.os, 'ubuntu') && steps.cache-brew.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: ${{ steps.cache-brew.outputs.cache-primary-key }}
        path: /home/linuxbrew/.linuxbrew

    - if: matrix.test
      run: |
        tee config.yml <<EOF
        verbosity: trace
        EOF

    - if: matrix.test
      run: cargo test --release --no-fail-fast --target ${{ matrix.target }}

    - name: Run determinism tests
      if: matrix.test && matrix.os == 'ubuntu-24.04'
      run: cargo test --release --target ${{ matrix.target }} -- --ignored sample_flac

    - name: Run cargo check
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        if ! cargo check --quiet --all-targets --message-format short
        then
          echo "::warning title=Cargo Check Failed::Please review the output for details."
        fi

    - name: Run cargo clippy
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        if ! cargo clippy --quiet --all-targets --message-format short
        then
          echo "::warning title=Clippy Check Failed::Please review the output for details."
        fi

    - name: Run cargo fmt
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        if ! cargo fmt --check
        then
          echo "::warning title=Format Check Failed::Please review the output for details."
        fi

    - if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: brew install cargo-audit

    - name: Run cargo audit
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        if ! cargo audit bin target/${{ matrix.target }}/release/caesura
        then
          echo "::warning title=Vulnerability Scan Failed::Please review the output for details."
        fi

    - run: git --no-pager diff --color


  cargo-publish:
    runs-on: ubuntu-24.04
    if: needs.release.outputs.version != '' && contains(needs.release.outputs.version, '-') == false
    needs:
    - release
    - cargo-build
    steps:

    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: cargo-manifests

    - run: git --no-pager diff --color

    - run: cargo publish --allow-dirty --no-verify
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}


  git-tag:
    runs-on: ubuntu-24.04
    if: needs.release.outputs.version != '' && contains(needs.release.outputs.version, '-')
    needs:
    - release
    - cargo-build
    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: actions/download-artifact@v4
      with:
        name: release-notes.md

    - name: git config
      run: ${{ secrets.GIT_CONFIG }}

    - name: git tag
      run: git tag "v${{ needs.release.outputs.version }}"

    - name: git push
      run: git push origin "v${{ needs.release.outputs.version }}"


  github-release:
    runs-on: ubuntu-24.04
    if: needs.release.outputs.version != '' && contains(needs.release.outputs.version, '-') == false
    needs:
      - release
      - cargo-build
    steps:

    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: release-notes.md

    - name: gh release create
      if: contains(needs.release.outputs.version, '-') == false
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        gh release create
        "v${{ needs.release.outputs.version }}"
        --title "v${{ needs.release.outputs.version }}"
        --notes-file release-notes.md
        --target ${{ github.ref_name }}

    - name: gh release create --prerelease
      if: contains(needs.release.outputs.version, '-')
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        gh release create
        "v${{ needs.release.outputs.version }}"
        --title "v${{ needs.release.outputs.version }}"
        --notes-file release-notes.md
        --target ${{ github.ref_name }}
        --prerelease

    - uses: actions/download-artifact@v4
      with:
        pattern: caesura-${{ needs.release.outputs.version }}-*
        merge-multiple: true

    - name: gh release upload
      run: >
        gh release upload
        "v${{ needs.release.outputs.version }}"
        "caesura-${{ needs.release.outputs.version }}-"*
        --clobber
        --repo "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: update homebrew-tap
      env:
        GH_TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
      run: >
        gh workflow run update-formula.yml
        -R RogueOneEcho/homebrew-tap
        -f name=caesura
        -f version=${{ needs.release.outputs.version }}

    - name: update nix
      env:
        GH_TOKEN: ${{ secrets.NIX_TOKEN }}
      run: >
        gh workflow run update-package.yml
        -R RogueOneEcho/nix
        -f name=caesura
        -f version=${{ needs.release.outputs.version }}


  docker-build:
    runs-on: ${{ matrix.os }}
    if: needs.release.outputs.version != ''
    needs:
    - release
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04
          arch: amd64
        - os: ubuntu-24.04-arm
          arch: arm64
    steps:

    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: buildx-${{ matrix.arch }}-${{ github.sha }}
        restore-keys: |
          buildx-${{ matrix.arch }}-

    - run: echo $GH_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - run: docker buildx create --use

    - run: >
        docker buildx build .
        --build-arg VERSION=${{ needs.release.outputs.version }}
        --tag ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}-${{ matrix.arch }}
        --cache-from=type=local,src=/tmp/.buildx-cache
        --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max
        --push

    # Temp fix
    # https://github.com/docker/build-push-action/issues/252
    # https://github.com/moby/buildkit/issues/1896
    - run: rm -rf /tmp/.buildx-cache
    - run: mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  docker-scan:
    runs-on: ubuntu-24.04
    if: needs.release.outputs.version != ''
    needs: [release, docker-build]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: amd64
        - arch: arm64
    env:
      IMAGE: ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}-${{ matrix.arch }}
    steps:

    - uses: actions/checkout@v4

    - run: echo $GH_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - run: echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

    - run: /home/linuxbrew/.linuxbrew/bin/brew install syft grype cosign CycloneDX/cyclonedx/cyclonedx-cli

    - name: Generate SBOM
      run: >
        syft ${{ env.IMAGE }}
        --platform linux/${{ matrix.arch }}
        --output cyclonedx-json=syft-sbom.cdx.json

    - name: Merge SBOMs
      run: >
        cyclonedx merge
        --input-files syft-sbom.cdx.json .github/sbom/source-deps.cdx.json
        --output-file merged-sbom.cdx.json
        --input-format json
        --output-format json
        --output-version v1_6

    - name: Vulnerability scan
      run: >
        grype sbom:merged-sbom.cdx.json
        --output table
        --fail-on critical

    - name: Get image digest
      id: digest
      run: |
        DIGEST=$(docker buildx imagetools inspect "${{ env.IMAGE }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

    - name: Attest SBOM
      run: >
        cosign attest
        --predicate merged-sbom.cdx.json
        --type cyclonedx
        --yes
        ghcr.io/rogueoneecho/caesura@${{ steps.digest.outputs.digest }}

    - uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ matrix.arch }}
        path: merged-sbom.cdx.json

  docker-release:
    runs-on: ubuntu-24.04
    needs:
    - release
    - cargo-build
    - docker-build
    - docker-scan
    steps:

    - run: echo $GH_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push version manifest
      run: >
        docker buildx imagetools create
        --tag ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}
        ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}-amd64
        ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}-arm64

    - name: Tag alpha manifest
      if: github.ref_name == 'main'
      run: >
        docker buildx imagetools create
        --tag ghcr.io/rogueoneecho/caesura:alpha
        ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}

    - name: Tag latest manifest
      if: contains(needs.release.outputs.version, '-') == false
      run: >
        docker buildx imagetools create
        --tag ghcr.io/rogueoneecho/caesura:latest
        ghcr.io/rogueoneecho/caesura:${{ needs.release.outputs.version }}
