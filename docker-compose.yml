services:
  caesura:
    container_name: caesura
    image: ghcr.io/rogueoneecho/caesura:latest
    # Run as host user so mounted volumes are accessible.
    # Replace with your own UID:GID
    user: "1000:1000"
    volumes:
    # Persistent cache for queue state and downloaded .torrent files
    - /srv/caesura/cache:/cache
    # qBittorrent torrent state used by `queue add` (read-only)
    - /srv/qBittorrent/BT_backup:/srv/qBittorrent/BT_backup:ro
    # Shared volume for content, output and autoadd — a single mount
    # enables hard linking between content and output directories
    - /srv/shared:/srv/shared
    # Inject config.yml from the `configs:` block at the bottom of this file
    configs:
    - source: caesura_config
      target: /config.yml
    # Drop all capabilities and prevent privilege escalation
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL

  # Optional: browse output directory at http://localhost:3000
  caddy:
    container_name: caddy
    image: caddy:2-alpine
    profiles:
    - browse
    ports:
    - "3000:80"
    volumes:
    # Mount the caesura output directory so it's browseable
    - /srv/shared/caesura:/srv:ro
    - caddy_data:/data
    - caddy_config:/config
    restart: unless-stopped
    command: caddy file-server --browse --root /srv
    # Filesystem is read-only except for /tmp (tmpfs) and named volumes
    read_only: true
    tmpfs:
    - /tmp
    # Drop all capabilities and prevent privilege escalation, then grant
    # only NET_BIND_SERVICE so Caddy can listen on port 80
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE

volumes:
  caddy_data:
  caddy_config:

# Inline config - edit the values below
# Refer to SETUP.md and OPTIONS.md for more details on settings.
# The paths must match the layout of the docker container which may differ from your host system.
configs:
  caesura_config:
    content: |
      announce_url: https://tracker.example.com/YOUR_ANNOUNCE_KEY/announce
      api_key: YOUR_API_KEY
      content:
      - /srv/shared/downloads/content
      copy_torrent_to: /srv/shared/caesura/autoadd
      hard_link: true
      output: /srv/shared/caesura
      queue_add_path: /srv/qBittorrent/BT_backup
      rename_tracks: true
      sox_ng: true
      sox_path: sox_ng
      target:
      - flac
      - v0
      - '320'
      verbosity: debug
